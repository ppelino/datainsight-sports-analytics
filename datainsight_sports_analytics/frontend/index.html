<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>⚽ DataInsight Sports Analytics PRO</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sports PRO">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <div>
        <h1>⚽ DataInsight Sports Analytics PRO</h1>
        <p>Scout, análise tática, atletas, adversários e plano de jogo inteligente</p>
    </div>

    <button onclick="logout()">Sair</button>
</header>

<section id="auth" class="card auth">
    <h2>Acesso</h2>

    <input id="email" placeholder="E-mail">
    <input id="password" type="password" placeholder="Senha">

    <div style="display:flex;gap:10px;margin-top:15px;">
        <button onclick="login()">Entrar</button>
    </div>
</section>

<main id="app" class="hidden">

    <nav>
        <button onclick="show('dash')">📊 Dashboard</button>
        <button onclick="show('teams')">⚽ Times</button>
        <button onclick="show('athletes')">🏃 Atletas</button>
        <button onclick="show('matches')">🏆 Jogos</button>
        <button onclick="show('scout')">📈 Scout</button>
        <button onclick="show('opponents')">🎯 Adversários</button>
        <button onclick="show('plans')">🧠 Plano de jogo</button>
    </nav>

    <section id="dash" class="page card">
        <h2>Dashboard</h2>
        <div id="cards" class="grid"></div>
        <canvas id="chart"></canvas>
    </section>

    <section id="teams" class="page card hidden">
        <h2>Times</h2>

        <form onsubmit="saveTeam(event)">
            <input name="name" placeholder="Nome do time" required>
            <input name="category" placeholder="Categoria">
            <input name="city" placeholder="Cidade">
            <input name="coach" placeholder="Treinador">
            <textarea name="notes" placeholder="Observações"></textarea>
            <button>Salvar time</button>
        </form>

        <div id="teamList"></div>
    </section>

    <section id="athletes" class="page card hidden">
        <h2>Atletas</h2>

        <form onsubmit="saveAthlete(event)">
            <select name="team_id" required></select>

            <input name="name" placeholder="Nome" required>
            <input name="position" placeholder="Posição">
            <input name="dominant_foot" placeholder="Pé dominante">
            <input name="age" type="number" placeholder="Idade">
            <input name="height" type="number" step="0.01" placeholder="Altura">
            <input name="weight" type="number" step="0.01" placeholder="Peso">

            <textarea name="strengths" placeholder="Pontos fortes"></textarea>
            <textarea name="weaknesses" placeholder="Pontos a melhorar"></textarea>

            <button>Salvar atleta</button>
        </form>

        <div id="athleteList"></div>
    </section>

    <section id="matches" class="page card hidden">
        <h2>Jogos</h2>

        <form onsubmit="saveMatch(event)">
            <select name="team_id" required></select>

            <input name="match_date" type="date" required>
            <input name="opponent" placeholder="Adversário" required>
            <input name="location" placeholder="Local">
            <input name="competition" placeholder="Competição">
            <input name="formation" placeholder="Formação">
            <input name="goals_for" type="number" placeholder="Gols pró">
            <input name="goals_against" type="number" placeholder="Gols contra">

            <textarea name="notes" placeholder="Observações"></textarea>

            <button>Salvar jogo</button>
        </form>

        <div id="matchList"></div>
    </section>

    <section id="scout" class="page card hidden">
        <h2>Scout da Partida</h2>

        <form onsubmit="saveScout(event)">
            <select name="match_id" required></select>
            <select name="athlete_id"></select>

            <input name="minute" type="number" placeholder="Minuto">

            <select name="event_type">
                <option>Gol</option>
                <option>Finalização</option>
                <option>Passe certo</option>
                <option>Passe errado</option>
                <option>Desarme</option>
                <option>Perda de bola</option>
                <option>Falta</option>
                <option>Escanteio</option>
                <option>Cartão</option>
                <option>Defesa do goleiro</option>
            </select>

            <input name="zone" placeholder="Zona do campo">
            <input name="result" placeholder="Resultado">

            <textarea name="notes" placeholder="Observações"></textarea>

            <button>Salvar evento</button>
        </form>

        <div id="scoutList"></div>
    </section>

    <section id="opponents" class="page card hidden">
        <h2>Análise do Adversário</h2>

        <form onsubmit="saveOpponent(event)">
            <input name="opponent" placeholder="Adversário" required>
            <input name="base_formation" placeholder="Formação Base">
            <input name="attack_side" placeholder="Lado Forte">

            <textarea name="strong_players" placeholder="Jogadores Destaque"></textarea>
            <textarea name="strengths" placeholder="Pontos Fortes"></textarea>
            <textarea name="weaknesses" placeholder="Pontos Fracos"></textarea>
            <textarea name="set_pieces_attack" placeholder="Bola Parada Ofensiva"></textarea>
            <textarea name="set_pieces_defense" placeholder="Bola Parada Defensiva"></textarea>
            <textarea name="how_scores" placeholder="Como faz gols"></textarea>
            <textarea name="how_concedes" placeholder="Como sofre gols"></textarea>

            <button>Salvar análise</button>
        </form>

        <div id="opponentList"></div>
    </section>

    <section id="plans" class="page card hidden">
        <h2>Plano de Jogo Inteligente</h2>

        <form onsubmit="savePlan(event)">
            <input name="opponent" placeholder="Adversário" required>
            <input name="recommended_formation" placeholder="Formação Recomendada">

            <textarea name="defensive_strategy" placeholder="Estratégia Defensiva"></textarea>
            <textarea name="offensive_strategy" placeholder="Estratégia Ofensiva"></textarea>
            <textarea name="individual_marking" placeholder="Marcação Individual"></textarea>
            <textarea name="set_piece_plan" placeholder="Plano Bola Parada"></textarea>
            <textarea name="substitutions" placeholder="Substituições Previstas"></textarea>

            <button>Gerar Plano</button>
        </form>

        <div id="planList"></div>
    </section>

</main>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
}
</script>

</body>
</html>
